# ==============================================================================
# secrets.yaml — Secret Kubernetes "bourse-secrets"
#
# Centralise toutes les valeurs sensibles consommées par les composants
# applicatifs (backend, bvc-producer) via envFrom.secretRef.
#
# Les valeurs sont fournies au moment du déploiement Helm via --set ou un
# fichier values-prod.yaml NON committé (cf. infra/README.md). Elles ne
# doivent JAMAIS être codées en dur dans ce template.
#
# stringData permet de fournir des valeurs en clair (Helm/Kubernetes les
# encode automatiquement en base64 côté API server), évitant les erreurs
# de double-encodage fréquentes avec le champ "data".
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bourse.fullname" . }}-secrets
  labels:
    {{- include "bourse.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Mot de passe de l'utilisateur PostgreSQL (bourse_db + keycloak_db)
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}

  # Mot de passe du compte administrateur Keycloak (console d'admin)
  KC_ADMIN_PASSWORD: {{ .Values.secrets.kcAdminPassword | quote }}

  # Secret du client confidentiel "admin-tools" utilisé par le backend
  # pour appeler l'Admin REST API de Keycloak (gestion des utilisateurs)
  KEYCLOAK_ADMIN_CLIENT_SECRET: {{ .Values.secrets.keycloakAdminClientSecret | quote }}

  # Clé API Resend, utilisée par Keycloak pour l'envoi d'emails SMTP
  # (réinitialisation de mot de passe, vérification OTP)
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | quote }}

  # Token partagé pour les appels inter-service banque ↔ bourse
  INTER_SERVICE_TOKEN: {{ .Values.secrets.interServiceToken | quote }}
