apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "bourse.fullname" . }}-postgres
  labels:
    {{- include "bourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "bourse.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "bourse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "bourse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bourse.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .Values.postgres.dbName | quote }}
            - name: PGTZ
              value: "Europe/Paris"
            # Évite l'erreur "directory not empty" causée par lost+found sur AKS
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # Crée aussi keycloak_db au premier démarrage
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    until pg_isready -U {{ .Values.postgres.username }}; do sleep 1; done
                    psql -U {{ .Values.postgres.username }} -c "CREATE DATABASE keycloak_db;" 2>/dev/null || true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.username | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bourse.fullname" . }}-postgres
  labels:
    {{- include "bourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    {{- include "bourse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
