# ==============================================================================
# frontend/service.yaml — Service ClusterIP pour le frontend investisseur
# ==============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bourse.fullname" . }}-frontend
  labels:
    {{- include "bourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "bourse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
