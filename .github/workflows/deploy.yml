name: "Build & Deploy — Bourse"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Passer les tests (skip)'
        type: boolean
        default: false
      build_apk:
        description: 'Construire un nouvel APK Android (consomme quota EAS)'
        type: boolean
        default: false

env:
  # Secrets à configurer dans Settings → Secrets → Actions du repo GitHub :
  #   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
  #   ACR_LOGIN_SERVER, EXPO_TOKEN
  ACR: ${{ secrets.ACR_LOGIN_SERVER }}
  NS:  bourse
  RG:  rg-cfc-dev
  AKS: bourse-aks-dev

jobs:
  # ── Détection des fichiers modifiés ────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:   ${{ steps.f.outputs.backend }}
      frontend:  ${{ steps.f.outputs.frontend }}
      admin:     ${{ steps.f.outputs.admin }}
      keycloak:  ${{ steps.f.outputs.keycloak }}
      kafka:     ${{ steps.f.outputs.kafka }}
      bvc_relay: ${{ steps.f.outputs.bvc_relay }}
      mobile_native: ${{ steps.f.outputs.mobile_native }}
      mobile_js:     ${{ steps.f.outputs.mobile_js }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            admin:
              - 'admin/**'
            keycloak:
              - 'keycloak/**'
            kafka:
              - 'kafka/**'
            bvc_relay:
              - 'serve.py'
            # Code natif → nouveau APK obligatoire
            mobile_native:
              - 'mobile/android/**'
              - 'mobile/ios/**'
              - 'mobile/eas.json'
              - 'mobile/app.json'
              - 'mobile/package.json'
              - 'mobile/package-lock.json'
            # Code JS/UI → OTA update suffit
            mobile_js:
              - 'mobile/app/**'
              - 'mobile/src/**'
              - 'mobile/screens/**'
              - 'mobile/hooks/**'
              - 'mobile/services/**'
              - 'mobile/constants/**'
              - 'mobile/assets/**'
              - 'mobile/App.tsx'

  # ── Build + Push + Deploy ──────────────────────────────────────────────────
  deploy:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.backend   == 'true' ||
      needs.changes.outputs.frontend  == 'true' ||
      needs.changes.outputs.admin     == 'true' ||
      needs.changes.outputs.keycloak  == 'true' ||
      needs.changes.outputs.kafka     == 'true' ||
      needs.changes.outputs.bvc_relay == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name $(echo "$ACR" | cut -d. -f1)

      # ── Builds conditionnels ────────────────────────────────────────────────
      - name: Build & push backend
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build \
            -t $ACR/bourse-backend:${{ github.sha }} \
            -t $ACR/bourse-backend:latest \
            ./backend
          docker push $ACR/bourse-backend:${{ github.sha }}
          docker push $ACR/bourse-backend:latest

      - name: Build & push frontend
        if: needs.changes.outputs.frontend == 'true'
        run: |
          docker build \
            -t $ACR/bourse-frontend:${{ github.sha }} \
            -t $ACR/bourse-frontend:latest \
            ./frontend
          docker push $ACR/bourse-frontend:${{ github.sha }}
          docker push $ACR/bourse-frontend:latest

      - name: Build & push admin
        if: needs.changes.outputs.admin == 'true'
        run: |
          docker build \
            -t $ACR/bourse-admin-frontend:${{ github.sha }} \
            -t $ACR/bourse-admin-frontend:latest \
            ./admin
          docker push $ACR/bourse-admin-frontend:${{ github.sha }}
          docker push $ACR/bourse-admin-frontend:latest

      - name: Build & push keycloak
        if: needs.changes.outputs.keycloak == 'true'
        run: |
          docker build \
            -t $ACR/bourse-keycloak:${{ github.sha }} \
            -t $ACR/bourse-keycloak:latest \
            ./keycloak
          docker push $ACR/bourse-keycloak:${{ github.sha }}
          docker push $ACR/bourse-keycloak:latest

      - name: Build & push BVC producer
        if: needs.changes.outputs.kafka == 'true'
        run: |
          docker build \
            -t $ACR/bourse-bvc-producer:${{ github.sha }} \
            -t $ACR/bourse-bvc-producer:latest \
            ./kafka
          docker push $ACR/bourse-bvc-producer:${{ github.sha }}
          docker push $ACR/bourse-bvc-producer:latest

      - name: Build & push BVC relay
        if: needs.changes.outputs.bvc_relay == 'true'
        run: |
          docker build \
            -t $ACR/bourse-bvc-relay:${{ github.sha }} \
            -t $ACR/bourse-bvc-relay:latest \
            -f infra/docker/bvc-relay.Dockerfile .
          docker push $ACR/bourse-bvc-relay:${{ github.sha }}
          docker push $ACR/bourse-bvc-relay:latest

      # ── Déploiement AKS ─────────────────────────────────────────────────────
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # az aks get-credentials --admin génère un kubeconfig basé sur certificat
      # (pas d'exec:/kubelogin) — compatible avec les runners GitHub Actions.
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $RG \
            --name $AKS \
            --admin \
            --overwrite-existing

      - name: Patch secret — TWELVE_DATA_API_KEY
        if: needs.changes.outputs.backend == 'true'
        run: |
          kubectl patch secret bourse-platform-secrets -n $NS \
            -p "{\"stringData\":{\"TWELVE_DATA_API_KEY\":\"${{ secrets.TWELVE_DATA_API_KEY }}\",\"TWELVE_DATA_REFRESH_SEC\":\"60\"}}"

      - name: Deploy backend
        if: needs.changes.outputs.backend == 'true'
        run: |
          kubectl set image deployment/bourse-platform-backend \
            -n $NS backend=$ACR/bourse-backend:${{ github.sha }}
          if ! kubectl rollout status deployment/bourse-platform-backend -n $NS --timeout=180s; then
            echo "::error::Déploiement backend échoué — rollback en cours..."
            kubectl rollout undo deployment/bourse-platform-backend -n $NS
            exit 1
          fi

      - name: Health check backend
        if: needs.changes.outputs.backend == 'true'
        run: |
          echo "Attente stabilisation du pod (15s)..."
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 https://api.cfconsultancy.org/api/health; then
              echo "Health check backend OK"
              exit 0
            fi
            echo "Tentative $i échouée, nouvel essai dans 10s..."
            sleep 10
          done
          echo "::error::Health check backend échoué — rollback en cours..."
          kubectl rollout undo deployment/bourse-platform-backend -n $NS
          exit 1

      - name: Deploy frontend
        if: needs.changes.outputs.frontend == 'true'
        run: |
          kubectl set image deployment/bourse-platform-frontend \
            -n $NS frontend=$ACR/bourse-frontend:${{ github.sha }}
          if ! kubectl rollout status deployment/bourse-platform-frontend -n $NS --timeout=180s; then
            echo "::error::Déploiement frontend échoué — rollback en cours..."
            kubectl rollout undo deployment/bourse-platform-frontend -n $NS
            exit 1
          fi

      - name: Health check frontend
        if: needs.changes.outputs.frontend == 'true'
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 https://bourse.cfconsultancy.org/; then
              echo "Health check frontend OK"
              exit 0
            fi
            echo "Tentative $i échouée, nouvel essai dans 10s..."
            sleep 10
          done
          echo "::error::Health check frontend échoué — rollback en cours..."
          kubectl rollout undo deployment/bourse-platform-frontend -n $NS
          exit 1

      - name: Deploy admin
        if: needs.changes.outputs.admin == 'true'
        run: |
          kubectl set image deployment/bourse-platform-admin-frontend \
            -n $NS admin-frontend=$ACR/bourse-admin-frontend:${{ github.sha }}
          if ! kubectl rollout status deployment/bourse-platform-admin-frontend -n $NS --timeout=180s; then
            echo "::error::Déploiement admin échoué — rollback en cours..."
            kubectl rollout undo deployment/bourse-platform-admin-frontend -n $NS
            exit 1
          fi

      - name: Deploy keycloak
        if: needs.changes.outputs.keycloak == 'true'
        run: |
          kubectl set image deployment/bourse-platform-keycloak \
            -n $NS keycloak=$ACR/bourse-keycloak:${{ github.sha }}
          if ! kubectl rollout status deployment/bourse-platform-keycloak -n $NS --timeout=180s; then
            echo "::error::Déploiement keycloak échoué — rollback en cours..."
            kubectl rollout undo deployment/bourse-platform-keycloak -n $NS
            exit 1
          fi

      - name: Deploy BVC producer
        if: needs.changes.outputs.kafka == 'true'
        run: |
          kubectl set image deployment/bourse-platform-bvc-producer \
            -n $NS bvc-producer=$ACR/bourse-bvc-producer:${{ github.sha }}
          if ! kubectl rollout status deployment/bourse-platform-bvc-producer -n $NS --timeout=180s; then
            echo "::error::Déploiement BVC producer échoué — rollback en cours..."
            kubectl rollout undo deployment/bourse-platform-bvc-producer -n $NS
            exit 1
          fi

      - name: Deploy BVC relay
        if: needs.changes.outputs.bvc_relay == 'true'
        run: |
          kubectl set image deployment/bourse-platform-bvc-relay \
            -n $NS bvc-relay=$ACR/bourse-bvc-relay:${{ github.sha }}
          if ! kubectl rollout status deployment/bourse-platform-bvc-relay -n $NS --timeout=180s; then
            echo "::error::Déploiement BVC relay échoué — rollback en cours..."
            kubectl rollout undo deployment/bourse-platform-bvc-relay -n $NS
            exit 1
          fi

  # ── Tests fonctionnels E2E (Selenium) ────────────────────────────────────────
  # Exécutés après le déploiement réussi, contre la production.
  # Créent un compte bourse réel → vérifient tout le flux utilisateur.
  tests-fonctionnels:
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-fonctionnels.txt

      - name: Installer les dépendances (Selenium + pytest)
        working-directory: backend
        run: pip install -r requirements-fonctionnels.txt

      - name: Installer Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Tests fonctionnels bourse (Selenium E2E)
        working-directory: backend
        env:
          BOURSE_BASE_URL: https://bourse.cfconsultancy.org
          PYTHONPATH: .
        run: |
          pytest tests/fonctionnels/ -v --tb=short 2>&1 | tee fonctionnels-report.txt

      - name: Publier le rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fonctionnels-report-bourse
          path: backend/fonctionnels-report.txt
          retention-days: 7

  # ── Mobile natif : nouveau APK — déclenchement MANUEL uniquement ─────────────
  # GitHub Actions → Run workflow → cocher "Construire un nouvel APK"
  # Quota EAS Free = 15 builds Android/mois — ne pas déclencher sur push.
  build-mobile:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_apk == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: EAS Build — Android APK (preview)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive

  # ── Mobile JS : OTA update via EAS Update ─────────────────────────────────
  # Changements JS/UI uniquement → OTA update (pas besoin de nouvel APK).
  # Si le natif a changé, build-mobile prend le relai — pas d'OTA inutile.
  update-mobile:
    needs: changes
    if: needs.changes.outputs.mobile_js == 'true' && needs.changes.outputs.mobile_native != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: EAS Update — OTA push
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: https://api.cfconsultancy.org
          EXPO_PUBLIC_KEYCLOAK_URL: https://auth.cfconsultancy.org
          EXPO_PUBLIC_KEYCLOAK_REALM: bourse-en-ligne
          EXPO_PUBLIC_KEYCLOAK_CLIENT_ID: mobile-app
          EXPO_PUBLIC_BANQUE_DASHBOARD_URL: https://banquedigitale.cfconsultancy.org
          EXPO_PUBLIC_MARKET_OPEN_HOUR: "9"
          EXPO_PUBLIC_MARKET_CLOSE_HOUR: "15"
          EXPO_PUBLIC_MARKET_CLOSE_MIN: "30"
        run: |
          eas update \
            --channel production \
            --message "Deploy ${{ github.sha }}" \
            --non-interactive
