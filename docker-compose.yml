name: plateforme-bourse-enligne

# ============================================================================
# Docker Compose - Squelette technique "Plateforme de Bourse en Ligne"
#
# Stack strictement limitee a :
#   - PostgreSQL  : persistance des donnees metier (bourse_db)
#   - Apache Kafka (mode KRaft, sans Zookeeper) : streaming temps reel
#   - Keycloak    : authentification OAuth2 / OIDC (SSO)
#
# Conforme a docs/architecture.md (sections 2, 3 et 4).
# ============================================================================

services:

  # --------------------------------------------------------------------
  # PostgreSQL : base unique "bourse_db" (schemas identite, marche,
  # portefeuille, ordres, historique - voir docs/architecture.md section 3)
  # --------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: bourse-postgres
    restart: unless-stopped
    environment:
      # Identifiants de connexion a la base (charges depuis .env a la racine)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Permet a PostgreSQL d'utiliser les locales fr_FR pour le tri/format
      PGTZ: Europe/Paris
    ports:
      # Port standard PostgreSQL expose sur l'hote pour les outils locaux
      - "5432:5432"
    volumes:
      # Volume nomme pour la persistance des donnees PostgreSQL
      - postgres_data:/var/lib/postgresql/data
      # Script(s) d'initialisation : execute automatiquement au premier
      # demarrage (creation des schemas/tables decrits dans docs/architecture.md)
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bourse-network

  # --------------------------------------------------------------------
  # Apache Kafka (mode KRaft - pas besoin de Zookeeper avec les images
  # recentes de Confluent). Un seul broker combine role "broker" + "controller"
  # adapte a un environnement de developpement local.
  # --------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: bourse-kafka
    restart: unless-stopped
    ports:
      # Port expose pour les clients externes (producers/consumers Python
      # lances depuis l'hote, hors reseau docker)
      - "9092:9092"
    environment:
      # Identifiant unique du noeud Kafka (broker + controller combines)
      KAFKA_NODE_ID: 1

      # Roles assures par ce noeud unique : a la fois broker (donnees)
      # et controller (metadonnees du cluster, remplace Zookeeper)
      KAFKA_PROCESS_ROLES: broker,controller

      # Identifiant de cluster KRaft (chaine arbitraire encodee en base64,
      # fixe ici pour un environnement de dev reproductible)
      CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"

      # Liste des "votants" du quorum controller (id@host:port)
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # Definition des listeners reseau :
      #  - PLAINTEXT       : pour la communication interne entre conteneurs (ex: kafka:29092)
      #  - PLAINTEXT_HOST  : pour les clients externes depuis l'hote (localhost:9092)
      #  - CONTROLLER      : pour le protocole interne KRaft (metadonnees)
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Facteur de replication = 1 car un seul broker en environnement local
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Repertoire de stockage des logs/donnees Kafka (metadonnees KRaft incluses)
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"

      # Creation automatique des topics absents lors de la premiere
      # publication (pratique en dev ; a desactiver en production)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      # Volume nomme pour la persistance des donnees/metadonnees Kafka (KRaft)
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - bourse-network

  # --------------------------------------------------------------------
  # Keycloak : fournisseur d'identite (IAM/SSO) - realm "bourse-en-ligne"
  # Import automatique du realm exporte au demarrage (--import-realm).
  # Utilise PostgreSQL comme base de donnees interne de Keycloak
  # (base separee "keycloak_db", distincte de "bourse_db").
  # --------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: bourse-keycloak
    restart: unless-stopped
    command:
      # start-dev : mode developpement (HTTP autorise, pas de certificats)
      # --import-realm : importe automatiquement les fichiers presents
      # dans /opt/keycloak/data/import au demarrage
      - start-dev
      - --import-realm
    environment:
      # Identifiants du compte administrateur Keycloak (charges depuis .env)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}

      # Configuration de la base de donnees interne de Keycloak (PostgreSQL)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}

      # Nom d'hote complet utilise pour generer les URLs (issuer, endpoints OIDC).
      # KC_HOSTNAME_PORT est deprecie en Keycloak 26 (hostname v2) - on passe
      # directement l'URL complete avec le port externe expose sur l'hote.
      KC_HOSTNAME: http://localhost:9090
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

      # SMTP Resend - utilise par Keycloak pour l'envoi d'emails (mot de passe
      # oublie, verification OTP, etc.). Ces variables sont lues dans le .env
      # a la racine du projet. Les valeurs sont injectees ici afin d'etre
      # accessibles dans le conteneur pour la configuration manuelle ou
      # via l'Admin REST API (cf. README pour la procedure de configuration).
      KC_SMTP_HOST: ${SMTP_HOST}
      KC_SMTP_PORT: ${SMTP_PORT}
      KC_SMTP_FROM: ${SMTP_FROM}
      KC_SMTP_FROM_DISPLAY_NAME: ${SMTP_FROM_DISPLAY_NAME}
      KC_SMTP_USER: resend
      KC_SMTP_PASSWORD: ${RESEND_API_KEY}
      KC_SMTP_STARTTLS: "true"
      KC_SMTP_SSL: "false"
      KC_SMTP_AUTH: "true"
      # Désactive le cache des thèmes en dev pour voir les modifs CSS sans restart
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
    ports:
      # Console d'administration et endpoints OIDC du realm
      - "9090:8080"  # (hote)9090 -> conteneur:8080
    volumes:
      # Realm investisseurs/support (bourse-en-ligne)
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      # Realm administrateurs (bourse-admin) — séparé pour isoler les comptes admin
      - ./keycloak/realm-admin-export.json:/opt/keycloak/data/import/realm-admin-export.json:ro
      # Thème personnalisé BourseOnline (dark theme aux couleurs de la plateforme)
      - ./keycloak/themes/bourse:/opt/keycloak/themes/bourse:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bourse-network

  # --------------------------------------------------------------------
  # Backend FastAPI : API d'administration (Module Admin) + endpoint
  # WebSocket /ws/market qui consomme le topic Kafka "market.prices"
  # et diffuse les snapshots BVC à tous les clients connectés.
  # --------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bourse-backend
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_BASE_URL: http://localhost:9090
      KEYCLOAK_REALM: bourse-en-ligne
      KEYCLOAK_BACKEND_CLIENT_ID: backend-api
      KEYCLOAK_ADMIN_CLIENT_ID: admin-tools
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-admin-tools-secret-a-changer}
      ROLE_ADMINISTRATEUR: administrateur
      ROLE_INVESTISSEUR: investisseur
      BANQUE_API_URL: http://host.docker.internal:8000
      BANQUE_FRONTEND_URL: http://cfc.127.0.0.1.nip.io
      INTER_SERVICE_TOKEN: bourse-banque-inter-service-token-poc
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - bourse-network

  # --------------------------------------------------------------------
  # BVC Producer : scrape la Bourse de Casablanca toutes les 30 s et
  # publie un snapshot JSON sur le topic Kafka "market.prices".
  # Scrape casablanca-bourse.com et publie les cotations sur market.prices.
  # --------------------------------------------------------------------
  bvc-producer:
    build:
      context: ./kafka
      dockerfile: Dockerfile
    container_name: bourse-bvc-producer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BVC_INTERVAL_SECONDS: "30"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bourse-network

  # --------------------------------------------------------------------
  # Back-Office Admin (Nginx) : sert l'interface d'administration sur le
  # port 3001, isolée de la plateforme investisseurs (port 3000).
  # Realm dédié : "bourse-admin" — seul admin1 peut s'y connecter.
  # --------------------------------------------------------------------
  admin-frontend:
    image: nginx:alpine
    container_name: bourse-admin-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./admin:/usr/share/nginx/html:ro
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - keycloak
      - backend
    networks:
      - bourse-network

  # --------------------------------------------------------------------
  # BVC Relay : relais HTTP pour le scraping BVC (serve.py).
  # Exposé sur /api/ par le nginx du frontend via proxy_pass http://bvc-relay:8765.
  # Remplace le lancement manuel de serve.py sur l'hôte.
  # --------------------------------------------------------------------
  bvc-relay:
    image: python:3.12-slim
    container_name: bourse-bvc-relay
    restart: unless-stopped
    command: python /app/serve.py
    volumes:
      - ./serve.py:/app/serve.py:ro
    networks:
      - bourse-network

  # --------------------------------------------------------------------
  # Frontend Web (Nginx) : sert le squelette de SPA statique (HTML/CSS/JS
  # vanilla, sans etape de build) présent dans ./frontend.
  # Le frontend redirige vers Keycloak (Authorization Code + PKCE) pour
  # l'authentification - cf. docs/architecture.md section 2.1 et le client
  # "frontend-spa" (redirectUris http://localhost:3000/*).
  # --------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: bourse-frontend
    restart: unless-stopped
    ports:
      # Port 3000, conforme au redirectUri "http://localhost:3000/*"
      # configure dans keycloak/realm-export.json (client frontend-spa)
      - "3000:80"
    volumes:
      # Fichiers statiques du frontend, montes en lecture seule dans le
      # repertoire servi par Nginx
      - ./frontend:/usr/share/nginx/html:ro
      # Configuration Nginx dediee (fallback SPA -> index.html)
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - keycloak
      - backend
    networks:
      - bourse-network

# ----------------------------------------------------------------------
# Volumes nommes : assurent la persistance des donnees entre redemarrages
# ----------------------------------------------------------------------
volumes:
  postgres_data:
  kafka_data:

# ----------------------------------------------------------------------
# Reseau dedie permettant aux services de communiquer entre eux par leur
# nom de service (ex: "postgres", "kafka", "keycloak")
# ----------------------------------------------------------------------
networks:
  bourse-network:
    driver: bridge
