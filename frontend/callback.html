<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plateforme de Bourse en Ligne - Connexion en cours...</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page-centree">
    <section class="carte">
      <h1>Connexion en cours...</h1>
      <p id="message-statut">Echange du code d'autorisation avec Keycloak, veuillez patienter.</p>
      <p id="message-erreur" class="message-erreur" hidden></p>
      <p id="lien-retour" hidden>
        <a href="index.html">Retour a la page de connexion</a>
      </p>
    </section>
  </main>

  <script>
    // Cacher immédiatement la page si on revient d'une inscription
    // (l'utilisateur ne doit pas voir "Connexion en cours..." — il sera
    // redirigé vers inscription.html sans interaction visible)
    if (sessionStorage.getItem("bourse_is_registration") === "true") {
      document.addEventListener("DOMContentLoaded", function () {
        var main = document.querySelector("main");
        if (main) main.style.visibility = "hidden";
      });
    }
  </script>
  <script type="module" src="js/callback.js"></script>
</body>
</html>
