server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # En K8s les services Helm sont préfixés par le nom de release
    # (ex: bourse-platform-backend, bourse-platform-bvc-relay)
    # BACKEND_SERVICE et BVC_RELAY_SERVICE sont substitués au build via
    # des ARG Docker ou restent dans le Dockerfile directement.

    location /ws/ {
        proxy_pass          http://bourse-platform-backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    location /api/ {
        proxy_pass         http://bourse-platform-bvc-relay:8765;
        proxy_set_header   Host $host;
        proxy_read_timeout 20s;
        add_header         Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|html)$ {
        add_header Cache-Control "no-cache";
    }
}
