# ============================================================================
# Configuration Nginx - sert les fichiers statiques du frontend (HTML/CSS/JS
# vanilla, sans build) avec un fallback SPA : toute route inconnue renvoie
# index.html (utile si des routes virtuelles cote client sont ajoutees plus
# tard ; pour ce squelette, chaque page est un fichier .html distinct mais
# le fallback est conserve par coherence avec une architecture SPA).
# ============================================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket temps réel : proxy vers le backend FastAPI (service "backend"
    # du docker-compose, port 8000). Requiert les headers Upgrade/Connection
    # pour que Nginx transmette correctement le handshake WebSocket.
    location /ws/ {
        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # BVC relay — 3 routes HTTP exactes pour les données de marché publiques
    location = /api/buildId  { proxy_pass http://bvc-relay:8765; proxy_read_timeout 20s; add_header Cache-Control "no-store"; }
    location = /api/overview { proxy_pass http://bvc-relay:8765; proxy_read_timeout 20s; add_header Cache-Control "no-store"; }
    location = /api/stocks   { proxy_pass http://bvc-relay:8765; proxy_read_timeout 20s; add_header Cache-Control "no-store"; }

    # Backend FastAPI — toutes les autres routes /api/ (portefeuille, ordres, sso, etc.)
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
        add_header         Cache-Control "no-store";
    }

    # Téléchargement APK — content-type et headers corrects pour Android
    location /downloads/ {
        add_header Content-Disposition 'attachment';
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        types { application/vnd.android.package-archive apk; }
        try_files $uri =404;
    }

    # Fallback SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pas de cache sur les assets statiques en developpement
    location ~* \.(?:js|css|html)$ {
        add_header Cache-Control "no-cache";
    }
}
