# ============================================================================
# Configuration Nginx - sert les fichiers statiques du frontend (HTML/CSS/JS
# vanilla, sans build) avec un fallback SPA : toute route inconnue renvoie
# index.html (utile si des routes virtuelles cote client sont ajoutees plus
# tard ; pour ce squelette, chaque page est un fichier .html distinct mais
# le fallback est conserve par coherence avec une architecture SPA).
# ============================================================================

server {
    listen 80;
    server_name localhost;

    # Racine des fichiers statiques (montee via volume Docker, cf. docker-compose.yml)
    root /usr/share/nginx/html;
    index index.html;

    # Types MIME : on inclut la table complete de Nginx puis on surcharge
    # uniquement .js/.mjs pour garantir application/javascript (modules ES)
    include /etc/nginx/mime.types;
    types {
        application/javascript js mjs;
    }

    # Fallback SPA : si le fichier demande n'existe pas, on renvoie
    # index.html (laisse la place a un futur routeur cote client)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Desactive la mise en cache agressive pendant le developpement
    location ~* \.(?:js|css|html)$ {
        add_header Cache-Control "no-cache";
    }
}
