# ============================================================================
# Configuration Nginx - sert les fichiers statiques du frontend (HTML/CSS/JS
# vanilla, sans build) avec un fallback SPA : toute route inconnue renvoie
# index.html (utile si des routes virtuelles cote client sont ajoutees plus
# tard ; pour ce squelette, chaque page est un fichier .html distinct mais
# le fallback est conserve par coherence avec une architecture SPA).
# ============================================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket temps réel : proxy vers le backend FastAPI (service "backend"
    # du docker-compose, port 8000). Requiert les headers Upgrade/Connection
    # pour que Nginx transmette correctement le handshake WebSocket.
    location /ws/ {
        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # Proxy HTTP vers le relais BVC (serve.py — secours si WebSocket indisponible).
    # Sur Docker Desktop (Mac/Windows) host.docker.internal resout vers l'hote.
    # Sur Linux, ajouter extra_hosts: ["host.docker.internal:host-gateway"] dans
    # docker-compose.yml si necessaire.
    location /api/ {
        proxy_pass         http://host.docker.internal:8765;
        proxy_set_header   Host $host;
        proxy_read_timeout 20s;
        add_header         Cache-Control "no-store";
    }

    # Fallback SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pas de cache sur les assets statiques en developpement
    location ~* \.(?:js|css|html)$ {
        add_header Cache-Control "no-cache";
    }
}
